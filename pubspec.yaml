name: portfilio
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Responsive layout package
  advanced_responsive: ^1.0.3

  # Google Fonts for modern typography
  google_fonts: ^6.2.1

  # Font Awesome icons
  font_awesome_flutter: ^10.7.0

  # URL launcher for opening links
  url_launcher: ^6.3.1

  # Animations
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/apps/
    - assets/apps/ajarha/
    - assets/apps/feasibility/
    - assets/apps/forall/
    - assets/apps/forall_ride/
    - assets/apps/forall_sales/
    - assets/apps/forall_vendor/
    - assets/apps/from_home_meal/
    - assets/apps/homes/
    - assets/apps/logosit/
    - assets/apps/radar/
    - assets/apps/syana/
    - assets/apps/tqnia_cs/
    - assets/apps/wecare/
    - assets/apps/xp/
    - assets/apps/yummy/

